; RowTech Hub Firmware
; Flashed to the single Wemos Lolin32 Lite on the cox box.
; No IMU connected — hub receives ESP-NOW from 8 sensors and forwards to Vercel.
;
; Secret injection: create platformio.local.ini (gitignored) with:
;   [env:lolin32_lite]
;   build_flags = -DCORE_DEBUG_LEVEL=0 -DHUB_SECRET='"your-secret"'

[platformio]
extra_configs = platformio.local.ini

[env:lolin32_lite]
platform              = espressif32
board                 = lolin32_lite
framework             = arduino
monitor_speed         = 115200
upload_speed          = 921600
build_flags           =
    -DCORE_DEBUG_LEVEL=0
lib_deps              =
    bblanchon/ArduinoJson @ ^7.0.0
    ayushsharma82/ElegantOTA @ ^3.1.0
    links2004/WebSockets @ ^2.4.1

[env:lolin32_lite_debug]
platform              = espressif32
board                 = lolin32_lite
framework             = arduino
monitor_speed         = 115200
upload_speed          = 460800
build_flags           =
    -DCORE_DEBUG_LEVEL=3
    -DDEBUG_MODE=1
lib_deps              =
    bblanchon/ArduinoJson @ ^7.0.0
    ayushsharma82/ElegantOTA @ ^3.1.0
    links2004/WebSockets @ ^2.4.1
