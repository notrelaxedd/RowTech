; RowTech Oar Sensor Firmware
; Flashed identically to all 8 oar sensor units.
; Each sensor is identified exclusively by its MAC address — no hardcoded seat ID.

[env:lolin32_lite]
platform              = espressif32
board                 = lolin32_lite
framework             = arduino
monitor_speed         = 115200
upload_speed          = 921600
build_flags           =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_COLORS=0
lib_deps              =
    electroniccats/MPU6050 @ ^1.3.0
    bblanchon/ArduinoJson @ ^7.0.0

[env:lolin32_lite_debug]
platform              = espressif32
board                 = lolin32_lite
framework             = arduino
monitor_speed         = 115200
upload_speed          = 460800
build_flags           =
    -DCORE_DEBUG_LEVEL=3
    -DDEBUG_MODE=1
lib_deps              =
    electroniccats/MPU6050 @ ^1.3.0
    bblanchon/ArduinoJson @ ^7.0.0
